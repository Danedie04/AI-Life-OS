// ─── Accent Button ────────────────────────────────────────────────────────────

class AccentButton extends StatelessWidget {
  final String label;
  final VoidCallback? onTap;
  final bool isOutlined;
  final IconData? icon;
  final EdgeInsets? padding;

  const AccentButton({
    super.key,
    required this.label,
    this.onTap,
    this.isOutlined = false,
    this.icon,
    this.padding,
  });

  @override
  Widget build(BuildContext context) {
    return GestureDetector(
      onTap: onTap,
      child: AnimatedContainer(
        duration: AppTheme.animFast,
        padding: padding ?? const EdgeInsets.symmetric(horizontal: 20, vertical: 11),
        decoration: BoxDecoration(
          gradient: isOutlined ? null : AppTheme.accentGradient,
          border: isOutlined
              ? Border.all(color: AppTheme.border2, width: 1)
              : null,
          borderRadius: BorderRadius.circular(AppTheme.radiusSM),
          boxShadow: isOutlined ? null : [
            BoxShadow(
              color: AppTheme.accent.withOpacity(0.35),
              blurRadius: 20,
              offset: const Offset(0, 4),
            ),
          ],
        ),
        child: Row(
          mainAxisSize: MainAxisSize.min,
          children: [
            if (icon != null) ...[
              Icon(icon, size: 15, color: isOutlined ? AppTheme.textSecondary : Colors.white),
              const SizedBox(width: 6),
            ],
            Text(
              label,
              style: TextStyle(
                fontFamily: 'DMSans',
                fontSize: 13,
                fontWeight: FontWeight.w600,
                color: isOutlined ? AppTheme.textSecondary : Colors.white,
              ),
            ),
          ],
        ),
      ),
    );
  }
}

